<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <title>PXBR Breed Manager</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <h1>PXBR Breed Manager</h1>

    <hr>

    <h2>Pesquisar Pokémon</h2>

    <input
        type="text"
        id="pokemonSearch"
        placeholder="Digite o nome">

    <ul id="pokemonResults"></ul>

    <hr>

    <h2>Novo Player</h2>

    <input
        type="text"
        id="playerNick"
        placeholder="Nick do player">

    <button id="btnSavePlayer">
        Salvar
    </button>

    <hr>

    <h2>Players Cadastrados</h2>
    <p>
        Total de players:
        <span id="playersCount">0</span>
    </p>

    <input
        type="text"
        id="searchPlayer"
        placeholder="Pesquisar player"
    >

    <ul id="playersList"></ul>

    <hr>

    <h2>Nova Encomenda</h2>

    <div id="orderForm">

        <div>

            <label for="orderPlayer">
                Player
            </label>

            <br>

            <select id="orderPlayer">

                <option value="">
                    Selecione um player
                </option>

            </select>

        </div>

        <br>

        <div>

            <h3>Pokémons</h3>

            <div id="pokemonOrderList">

            </div>

            <button
                type="button"
                id="btnAddPokemon">

                + Adicionar Pokémon

            </button>

        </div>

        <br>

        <div>

            <label>
                Desconto
            </label>

            <input
                type="checkbox"
                id="hasDiscount">

            <br><br>

            <input
                type="text"
                id="discountValue"
                placeholder="Valor do desconto"
                value="0"
                style="display:none;"
            >

        </div>

        <br>

        <div>

            <strong>
                Total:
            </strong>

            <span id="orderTotal">
                $ 0
            </span>

        </div>

        <br>

        <button
            type="button"
            id="btnCreateOrder">

            Criar Encomenda
        </button>
        
        <!-- Modal de Confirmação -->
        <div 
            id="orderModal"
            class="modal hidden">

            <div class="modal-content">

                <h2>
                    Confirmar Encomenda
                </h2>

                <div id="orderSummary"></div>

                <hr>

                <p>
                    Precisa capturar alguma fêmea ainda?
                </p>

                <label>
                    <input
                        type="radio"
                        name="needsFemale"
                        value="yes">

                    Sim
                </label>

                <label>
                    <input
                        type="radio"
                        name="needsFemale"
                        value="no">

                    Não
                </label>

                <hr>

                <button
                    type="button"
                    id="btnCancelOrder">

                    Cancelar

                </button>

                <button
                    type="button"
                    id="btnConfirmOrder"
                    disabled>

                    Confirmar

                </button>

            </div>

        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/pokemon.js"></script>
    <script src="js/players.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
